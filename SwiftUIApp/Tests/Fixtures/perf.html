<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orion deterministic performance fixture</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #f4f7fb; color: #172033; font: 16px system-ui; }
    main { max-width: 760px; margin: 64px auto; padding: 32px; border-radius: 20px; background: white; }
    #resources { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin-top: 24px; }
    #resources img { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <main>
    <h1>Orion performance fixture</h1>
    <p>This page is local, deterministic, and requests 100 tiny subresources.</p>
    <div id="resources"></div>
  </main>
  <script>
    const resources = document.getElementById('resources');
    for (let index = 0; index < 100; index += 1) {
      const image = document.createElement('img');
      image.alt = '';
      image.src = `pixel.svg?resource=${index}`;
      resources.appendChild(image);
    }
  </script>
</body>
</html>
