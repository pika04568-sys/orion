<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Offline Arcade</title>
  <style>
    :root {
      --ink: #f6f1dd;
      --muted: rgba(246, 241, 221, 0.78);
      --panel: rgba(9, 17, 32, 0.84);
      --panel-border: rgba(132, 203, 255, 0.18);
      --accent: #ffd166;
      --accent-2: #56f39a;
      --accent-3: #63b8ff;
      --danger: #ff6978;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(99, 184, 255, 0.22), transparent 36%),
        radial-gradient(circle at bottom right, rgba(255, 209, 102, 0.18), transparent 34%),
        linear-gradient(160deg, #060b17 0%, #0b1326 52%, #111929 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vw;
      height: 38vw;
      max-width: 420px;
      max-height: 420px;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.24;
      pointer-events: none;
    }

    body::before {
      top: -10%;
      left: -8%;
      background: radial-gradient(circle, rgba(86, 243, 154, 0.58), transparent 68%);
      animation: drift 16s ease-in-out infinite;
    }

    body::after {
      bottom: -10%;
      right: -8%;
      background: radial-gradient(circle, rgba(255, 105, 120, 0.46), transparent 68%);
      animation: drift 20s ease-in-out infinite reverse;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 24px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .meta {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.76rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1rem;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .controls {
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .controls h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .controls p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      color: #091120;
      background: linear-gradient(135deg, var(--accent), #ffb84d);
      box-shadow: 0 14px 30px rgba(255, 209, 102, 0.22);
    }

    .secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .stage {
      padding: 22px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(99, 184, 255, 0.08), transparent 40%),
        linear-gradient(315deg, rgba(86, 243, 154, 0.07), transparent 42%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .canvas-wrap {
      position: relative;
      width: min(100%, 840px);
      aspect-ratio: 1 / 1;
      max-height: calc(100vh - 84px);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(8, 14, 28, 0.96), rgba(4, 8, 18, 0.96)),
        radial-gradient(circle at top, rgba(99, 184, 255, 0.12), transparent 42%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .status {
      margin-top: auto;
      padding-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 2.9em;
    }

    .status.alert {
      color: #ffd9dd;
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .canvas-wrap {
        max-height: none;
      }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(20px, -18px, 0) scale(1.08); }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="panel meta">
      <p class="eyebrow">Offline Arcade</p>
      <div>
        <h1 id="game-title">Snake</h1>
        <p class="subhead">No internet right now, so Orion dropped you into a built-in arcade instead.</p>
      </div>
      <div class="badge" id="target-label">Retry target: current page</div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best">0</span>
        </div>
      </div>
      <div class="controls">
        <h2>Controls</h2>
        <p id="controls-text">Arrow keys or WASD to move.</p>
      </div>
      <div class="buttons">
        <button type="button" class="primary" id="retry-btn">Retry connection</button>
        <button type="button" class="secondary" id="restart-btn">Restart game</button>
      </div>
      <p class="status" id="status">Stay sharp. Refreshing this tab while you are still offline will rotate to a different game.</p>
    </section>
    <section class="panel stage">
      <div class="canvas-wrap">
        <canvas id="game-canvas" width="720" height="720"></canvas>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const GAME_LABELS = {
        tetris: 'Tetris',
        snake: 'Snake',
        pacman: 'Pac-Man'
      };
      const CONTROL_COPY = {
        tetris: 'Arrow keys move, Up/X rotates clockwise, Z rotates backward, Space hard-drops.',
        snake: 'Arrow keys or WASD steer. Eat the fruit and avoid walls and yourself.',
        pacman: 'Arrow keys or WASD move. Clear the maze and dodge the ghosts.'
      };

      const game = GAME_LABELS[params.get('game')] ? params.get('game') : 'snake';
      const target = params.get('target') || 'chrome://newtab';
      const title = GAME_LABELS[game];

      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      const gameTitle = document.getElementById('game-title');
      const targetLabel = document.getElementById('target-label');
      const controlsText = document.getElementById('controls-text');
      const scoreEl = document.getElementById('score');
      const bestEl = document.getElementById('best');
      const statusEl = document.getElementById('status');
      const retryBtn = document.getElementById('retry-btn');
      const restartBtn = document.getElementById('restart-btn');

      let controller = null;
      let animationFrame = null;
      let lastTimestamp = 0;

      gameTitle.textContent = title;
      controlsText.textContent = CONTROL_COPY[game];
      document.title = `${title} • Offline`;
      targetLabel.textContent = target === 'chrome://newtab'
        ? 'Retry target: new tab'
        : `Retry target: ${target}`;

      function setScore(score) {
        const safeScore = Number.isFinite(score) ? Math.max(0, Math.floor(score)) : 0;
        scoreEl.textContent = String(safeScore);
        const bestKey = `orion-offline-best-${game}`;
        const previousBest = Number(localStorage.getItem(bestKey) || '0');
        const nextBest = Math.max(previousBest, safeScore);
        bestEl.textContent = String(nextBest);
        if (nextBest !== previousBest) localStorage.setItem(bestKey, String(nextBest));
      }

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = type ? `status ${type}` : 'status';
      }

      function drawBackdrop(gridSize) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const size = gridSize || 24;
        ctx.fillStyle = '#071021';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.035)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += size) {
          ctx.beginPath();
          ctx.moveTo(x + 0.5, 0);
          ctx.lineTo(x + 0.5, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += size) {
          ctx.beginPath();
          ctx.moveTo(0, y + 0.5);
          ctx.lineTo(canvas.width, y + 0.5);
          ctx.stroke();
        }
      }

      function fitRect(cols, rows, padding = 48) {
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;
        const cell = Math.floor(Math.min(width / cols, height / rows));
        const drawWidth = cols * cell;
        const drawHeight = rows * cell;
        return {
          cell,
          x: Math.floor((canvas.width - drawWidth) / 2),
          y: Math.floor((canvas.height - drawHeight) / 2),
          width: drawWidth,
          height: drawHeight
        };
      }

      function createSnakeGame() {
        const cols = 20;
        const rows = 20;
        const board = fitRect(cols, rows, 64);
        const origin = {
          x: Math.floor(cols / 2),
          y: Math.floor(rows / 2)
        };
        let snake = [origin, { x: origin.x - 1, y: origin.y }, { x: origin.x - 2, y: origin.y }];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = placeFood();
        let accumulator = 0;
        let gameOver = false;
        let score = 0;

        setScore(0);
        setStatus('Collect as much fruit as you can before the walls or your tail catch you.');

        function placeFood() {
          const free = [];
          for (let y = 0; y < rows; y += 1) {
            for (let x = 0; x < cols; x += 1) {
              if (!snake.some((part) => part.x === x && part.y === y)) free.push({ x, y });
            }
          }
          return free[Math.floor(Math.random() * free.length)] || { x: 1, y: 1 };
        }

        function sameCell(a, b) {
          return a.x === b.x && a.y === b.y;
        }

        return {
          restart: createSnakeGame,
          keydown(event) {
            const key = event.key.toLowerCase();
            const candidate = (
              key === 'arrowup' || key === 'w' ? { x: 0, y: -1 } :
              key === 'arrowdown' || key === 's' ? { x: 0, y: 1 } :
              key === 'arrowleft' || key === 'a' ? { x: -1, y: 0 } :
              key === 'arrowright' || key === 'd' ? { x: 1, y: 0 } :
              null
            );
            if (!candidate || gameOver) return;
            if (candidate.x === -direction.x && candidate.y === -direction.y) return;
            nextDirection = candidate;
          },
          update(delta) {
            if (gameOver) return;
            accumulator += delta;
            if (accumulator < 110) return;
            accumulator = 0;
            direction = nextDirection;
            const head = {
              x: snake[0].x + direction.x,
              y: snake[0].y + direction.y
            };
            const hitsWall = head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
            const hitsSelf = snake.some((part) => sameCell(part, head));
            if (hitsWall || hitsSelf) {
              gameOver = true;
              setStatus('Snake down. Press Enter or Restart Game to try again.', 'alert');
              return;
            }
            snake.unshift(head);
            if (sameCell(head, food)) {
              score += 10;
              setScore(score);
              food = placeFood();
            } else {
              snake.pop();
            }
          },
          render(time) {
            drawBackdrop(board.cell);
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.fillRect(board.x - 12, board.y - 12, board.width + 24, board.height + 24);

            ctx.fillStyle = '#ff8c69';
            ctx.beginPath();
            ctx.arc(
              board.x + food.x * board.cell + board.cell / 2,
              board.y + food.y * board.cell + board.cell / 2,
              board.cell * 0.32 + Math.sin(time / 180) * 1.6,
              0,
              Math.PI * 2
            );
            ctx.fill();

            snake.forEach((part, index) => {
              const x = board.x + part.x * board.cell;
              const y = board.y + part.y * board.cell;
              const gradient = ctx.createLinearGradient(x, y, x + board.cell, y + board.cell);
              gradient.addColorStop(0, index === 0 ? '#63b8ff' : '#56f39a');
              gradient.addColorStop(1, index === 0 ? '#94d0ff' : '#2fe37f');
              ctx.fillStyle = gradient;
              roundRect(x + 2, y + 2, board.cell - 4, board.cell - 4, 8);
              ctx.fill();
            });
          }
        };
      }

      function createTetrisGame() {
        const cols = 10;
        const rows = 20;
        const boardRect = fitRect(cols + 5, rows, 48);
        const cell = boardRect.cell;
        const boardX = boardRect.x;
        const boardY = boardRect.y;
        const sidebarX = boardX + cols * cell + cell;
        const pieces = [
          { color: '#63b8ff', shape: [[1, 1, 1, 1]] },
          { color: '#ffd166', shape: [[1, 1], [1, 1]] },
          { color: '#56f39a', shape: [[0, 1, 1], [1, 1, 0]] },
          { color: '#ff6978', shape: [[1, 1, 0], [0, 1, 1]] },
          { color: '#c18cff', shape: [[0, 1, 0], [1, 1, 1]] },
          { color: '#ff9f1c', shape: [[1, 0, 0], [1, 1, 1]] },
          { color: '#2ec4b6', shape: [[0, 0, 1], [1, 1, 1]] }
        ];
        let board = Array.from({ length: rows }, () => Array(cols).fill(null));
        let piece = spawnPiece();
        let accumulator = 0;
        let score = 0;
        let lines = 0;
        let gameOver = false;

        setScore(0);
        setStatus('Stack clean lines to keep the board open. Hard-drops are worth the risk.');

        function cloneMatrix(matrix) {
          return matrix.map((row) => row.slice());
        }

        function rotateMatrix(matrix, dir) {
          const rotated = matrix[0].map((_, index) => matrix.map((row) => row[index]));
          return dir > 0
            ? rotated.map((row) => row.reverse())
            : rotated.reverse();
        }

        function spawnPiece() {
          const template = pieces[Math.floor(Math.random() * pieces.length)];
          const shape = cloneMatrix(template.shape);
          const next = {
            x: Math.floor((cols - shape[0].length) / 2),
            y: 0,
            color: template.color,
            shape
          };
          if (collides(next)) {
            gameOver = true;
            setStatus('Board topped out. Press Enter or Restart Game to go again.', 'alert');
          }
          return next;
        }

        function collides(candidate) {
          for (let y = 0; y < candidate.shape.length; y += 1) {
            for (let x = 0; x < candidate.shape[y].length; x += 1) {
              if (!candidate.shape[y][x]) continue;
              const nx = candidate.x + x;
              const ny = candidate.y + y;
              if (nx < 0 || nx >= cols || ny >= rows) return true;
              if (ny >= 0 && board[ny][nx]) return true;
            }
          }
          return false;
        }

        function mergeCurrent() {
          piece.shape.forEach((row, y) => {
            row.forEach((value, x) => {
              if (!value) return;
              const by = piece.y + y;
              if (by >= 0) board[by][piece.x + x] = piece.color;
            });
          });
        }

        function clearLines() {
          let cleared = 0;
          board = board.filter((row) => {
            if (row.every(Boolean)) {
              cleared += 1;
              return false;
            }
            return true;
          });
          while (board.length < rows) board.unshift(Array(cols).fill(null));
          if (!cleared) return;
          lines += cleared;
          score += [0, 100, 280, 500, 800][cleared] || cleared * 260;
          setScore(score);
        }

        function move(dx, dy) {
          if (gameOver) return false;
          const candidate = { ...piece, x: piece.x + dx, y: piece.y + dy };
          if (collides(candidate)) return false;
          piece = candidate;
          return true;
        }

        function drop() {
          if (move(0, 1)) return;
          mergeCurrent();
          clearLines();
          piece = spawnPiece();
        }

        function rotate(dir) {
          if (gameOver) return;
          const rotated = { ...piece, shape: rotateMatrix(piece.shape, dir) };
          const kicks = [0, -1, 1, -2, 2];
          for (const offset of kicks) {
            const candidate = { ...rotated, x: rotated.x + offset };
            if (!collides(candidate)) {
              piece = candidate;
              return;
            }
          }
        }

        return {
          restart: createTetrisGame,
          keydown(event) {
            const key = event.key.toLowerCase();
            if (gameOver) return;
            if (key === 'arrowleft' || key === 'a') move(-1, 0);
            else if (key === 'arrowright' || key === 'd') move(1, 0);
            else if (key === 'arrowdown' || key === 's') {
              if (move(0, 1)) {
                score += 1;
                setScore(score);
              }
            } else if (key === 'arrowup' || key === 'x') rotate(1);
            else if (key === 'z') rotate(-1);
            else if (key === ' ') {
              let hardDrop = 0;
              while (move(0, 1)) hardDrop += 1;
              score += hardDrop * 2;
              setScore(score);
              drop();
            }
          },
          update(delta) {
            if (gameOver) return;
            accumulator += delta;
            const interval = Math.max(120, 580 - Math.floor(lines / 3) * 30);
            if (accumulator < interval) return;
            accumulator = 0;
            drop();
          },
          render() {
            drawBackdrop(cell);
            ctx.fillStyle = 'rgba(255,255,255,0.045)';
            roundRect(boardX - 12, boardY - 12, cols * cell + 24, rows * cell + 24, 18);
            ctx.fill();

            board.forEach((row, y) => {
              row.forEach((color, x) => {
                if (!color) return;
                drawBlock(boardX + x * cell, boardY + y * cell, cell, color);
              });
            });

            piece.shape.forEach((row, y) => {
              row.forEach((value, x) => {
                if (!value) return;
                drawBlock(boardX + (piece.x + x) * cell, boardY + (piece.y + y) * cell, cell, piece.color);
              });
            });

            ctx.fillStyle = '#f6f1dd';
            ctx.font = '700 22px "Avenir Next", "Trebuchet MS", sans-serif';
            ctx.fillText('Lines', sidebarX, boardY + 42);
            ctx.font = '700 44px "Avenir Next", "Trebuchet MS", sans-serif';
            ctx.fillText(String(lines), sidebarX, boardY + 88);
          }
        };
      }

      function createPacmanGame() {
        const layout = [
          '###############',
          '#.............#',
          '#.###.###.###.#',
          '#o###.###.###o#',
          '#.............#',
          '#.###.#.#.###.#',
          '#.....#.#.....#',
          '#####.#.#.#####',
          '#.....#.#.....#',
          '#.###.#.#.###.#',
          '#.............#',
          '#.###.###.###.#',
          '#o..#.....#..o#',
          '#.##.#####.##.#',
          '#.............#',
          '###############'
        ];
        const cols = layout[0].length;
        const rows = layout.length;
        const maze = layout.map((row) => row.split(''));
        const board = fitRect(cols, rows, 52);
        const ghosts = [
          { x: 7, y: 7, dir: { x: 1, y: 0 }, color: '#ff6978' },
          { x: 7, y: 8, dir: { x: -1, y: 0 }, color: '#63b8ff' },
          { x: 6, y: 7, dir: { x: 0, y: 1 }, color: '#ffd166' }
        ];
        const player = { x: 1, y: 1, dir: { x: 0, y: 0 }, nextDir: { x: 0, y: 0 } };
        let accumulator = 0;
        let ghostAccumulator = 0;
        let score = 0;
        let gameOver = false;
        let won = false;
        let pellets = countPellets();

        maze[player.y][player.x] = ' ';
        setScore(0);
        setStatus('Clear the maze and keep moving. The ghosts get bolder once you hesitate.');

        function countPellets() {
          return maze.reduce((total, row) => total + row.filter((cell) => cell === '.' || cell === 'o').length, 0);
        }

        function isWall(x, y) {
          return x < 0 || x >= cols || y < 0 || y >= rows || maze[y][x] === '#';
        }

        function availableDirections(entity) {
          const options = [
            { x: 1, y: 0 },
            { x: -1, y: 0 },
            { x: 0, y: 1 },
            { x: 0, y: -1 }
          ].filter((dir) => !isWall(entity.x + dir.x, entity.y + dir.y));

          const reverse = { x: -entity.dir.x, y: -entity.dir.y };
          const withoutReverse = options.filter((dir) => dir.x !== reverse.x || dir.y !== reverse.y);
          return withoutReverse.length ? withoutReverse : options;
        }

        function chooseGhostDirection(ghost) {
          const options = availableDirections(ghost);
          if (!options.length) return { x: 0, y: 0 };
          if (Math.random() < 0.28) return options[Math.floor(Math.random() * options.length)];

          return options.reduce((best, dir) => {
            const next = { x: ghost.x + dir.x, y: ghost.y + dir.y };
            const distance = Math.abs(player.x - next.x) + Math.abs(player.y - next.y);
            if (!best || distance < best.distance) return { dir, distance };
            return best;
          }, null).dir;
        }

        function consumePellet() {
          const cell = maze[player.y][player.x];
          if (cell !== '.' && cell !== 'o') return;
          maze[player.y][player.x] = ' ';
          pellets -= 1;
          score += cell === 'o' ? 25 : 10;
          setScore(score);
          if (pellets <= 0) {
            won = true;
            gameOver = true;
            setStatus('Maze clear. Press Enter or Restart Game for another run.', 'alert');
          }
        }

        function checkCollision() {
          if (ghosts.some((ghost) => ghost.x === player.x && ghost.y === player.y)) {
            gameOver = true;
            setStatus('Caught by a ghost. Press Enter or Restart Game to jump back in.', 'alert');
          }
        }

        return {
          restart: createPacmanGame,
          keydown(event) {
            const key = event.key.toLowerCase();
            const next = (
              key === 'arrowup' || key === 'w' ? { x: 0, y: -1 } :
              key === 'arrowdown' || key === 's' ? { x: 0, y: 1 } :
              key === 'arrowleft' || key === 'a' ? { x: -1, y: 0 } :
              key === 'arrowright' || key === 'd' ? { x: 1, y: 0 } :
              null
            );
            if (!next) return;
            player.nextDir = next;
          },
          update(delta) {
            if (gameOver) return;
            accumulator += delta;
            ghostAccumulator += delta;

            if (accumulator >= 145) {
              accumulator = 0;
              const desired = player.nextDir;
              if (!isWall(player.x + desired.x, player.y + desired.y)) player.dir = desired;
              if (!isWall(player.x + player.dir.x, player.y + player.dir.y)) {
                player.x += player.dir.x;
                player.y += player.dir.y;
              }
              consumePellet();
              checkCollision();
            }

            if (ghostAccumulator >= 185) {
              ghostAccumulator = 0;
              ghosts.forEach((ghost) => {
                ghost.dir = chooseGhostDirection(ghost);
                ghost.x += ghost.dir.x;
                ghost.y += ghost.dir.y;
              });
              checkCollision();
            }
          },
          render(time) {
            drawBackdrop(board.cell);
            ctx.fillStyle = 'rgba(255,255,255,0.045)';
            roundRect(board.x - 16, board.y - 16, board.width + 32, board.height + 32, 18);
            ctx.fill();

            maze.forEach((row, y) => {
              row.forEach((cell, x) => {
                const px = board.x + x * board.cell;
                const py = board.y + y * board.cell;
                if (cell === '#') {
                  ctx.fillStyle = '#123c8d';
                  roundRect(px + 2, py + 2, board.cell - 4, board.cell - 4, 8);
                  ctx.fill();
                } else if (cell === '.' || cell === 'o') {
                  ctx.fillStyle = cell === 'o' ? '#ffd166' : '#f6f1dd';
                  ctx.beginPath();
                  ctx.arc(
                    px + board.cell / 2,
                    py + board.cell / 2,
                    cell === 'o' ? board.cell * 0.18 : board.cell * 0.09,
                    0,
                    Math.PI * 2
                  );
                  ctx.fill();
                }
              });
            });

            const mouth = 0.22 + (Math.sin(time / 130) + 1) * 0.12;
            ctx.fillStyle = '#ffd166';
            ctx.beginPath();
            ctx.moveTo(board.x + player.x * board.cell + board.cell / 2, board.y + player.y * board.cell + board.cell / 2);
            ctx.arc(
              board.x + player.x * board.cell + board.cell / 2,
              board.y + player.y * board.cell + board.cell / 2,
              board.cell * 0.38,
              mouth,
              Math.PI * 2 - mouth
            );
            ctx.closePath();
            ctx.fill();

            ghosts.forEach((ghost) => {
              const gx = board.x + ghost.x * board.cell + board.cell / 2;
              const gy = board.y + ghost.y * board.cell + board.cell / 2;
              ctx.fillStyle = ghost.color;
              ctx.beginPath();
              ctx.moveTo(gx - board.cell * 0.34, gy + board.cell * 0.3);
              ctx.lineTo(gx - board.cell * 0.34, gy - board.cell * 0.05);
              ctx.quadraticCurveTo(gx - board.cell * 0.34, gy - board.cell * 0.42, gx, gy - board.cell * 0.42);
              ctx.quadraticCurveTo(gx + board.cell * 0.34, gy - board.cell * 0.42, gx + board.cell * 0.34, gy - board.cell * 0.05);
              ctx.lineTo(gx + board.cell * 0.34, gy + board.cell * 0.3);
              ctx.lineTo(gx + board.cell * 0.14, gy + board.cell * 0.18);
              ctx.lineTo(gx, gy + board.cell * 0.3);
              ctx.lineTo(gx - board.cell * 0.14, gy + board.cell * 0.18);
              ctx.closePath();
              ctx.fill();
            });

            if (won) {
              ctx.fillStyle = 'rgba(255, 209, 102, 0.16)';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
          }
        };
      }

      function drawBlock(x, y, size, color) {
        const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
        gradient.addColorStop(0, color);
        gradient.addColorStop(1, '#ffffff');
        ctx.fillStyle = gradient;
        roundRect(x + 2, y + 2, size - 4, size - 4, 7);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function buildController() {
        if (game === 'tetris') return createTetrisGame();
        if (game === 'pacman') return createPacmanGame();
        return createSnakeGame();
      }

      function stopLoop() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }

      function startLoop() {
        stopLoop();
        lastTimestamp = 0;
        const tick = (timestamp) => {
          const delta = lastTimestamp ? timestamp - lastTimestamp : 0;
          lastTimestamp = timestamp;
          controller.update(delta);
          controller.render(timestamp);
          animationFrame = requestAnimationFrame(tick);
        };
        animationFrame = requestAnimationFrame(tick);
      }

      function restartGame() {
        controller = buildController();
        startLoop();
      }

      function retryTarget() {
        if (window.electron && window.electron.invoke) {
          window.electron.invoke('navigate-to', target);
          return;
        }
        if (target === 'chrome://newtab') window.location.reload();
        else window.location.href = target;
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && statusEl.classList.contains('alert')) {
          restartGame();
          return;
        }
        if (controller && typeof controller.keydown === 'function') controller.keydown(event);
      });

      retryBtn.addEventListener('click', retryTarget);
      restartBtn.addEventListener('click', restartGame);
      window.addEventListener('beforeunload', stopLoop);

      restartGame();
    })();
  </script>
</body>

</html>
