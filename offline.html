<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>Offline Arcade</title>
  <style>
    :root {
      --ink: #17202e;
      --muted: #5f6978;
      --quiet: #87909d;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-soft: rgba(247, 249, 252, 0.86);
      --line: rgba(91, 105, 124, 0.18);
      --line-strong: rgba(45, 57, 74, 0.22);
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #c2415b;
      --shadow-soft: 0 18px 48px rgba(17, 24, 39, 0.16);
      --shadow-deep: 0 26px 80px rgba(15, 23, 42, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Inter", "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(244, 247, 251, 0.86)),
        radial-gradient(circle at 18% 12%, rgba(96, 165, 250, 0.2), transparent 28%),
        radial-gradient(circle at 82% 82%, rgba(148, 163, 184, 0.24), transparent 30%),
        #edf2f7;
      overflow: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(51, 65, 85, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(51, 65, 85, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent 78%);
      pointer-events: none;
    }

    .shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(300px, 390px) minmax(0, 1fr);
      gap: 24px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px) saturate(1.2);
    }

    .meta {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: calc(100dvh - 48px);
      overflow-y: auto;
    }

    .connection {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 6px;
    }

    .eyebrow {
      margin: 0;
      color: var(--quiet);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .connection-state {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #fff1f2;
      border: 1px solid rgba(190, 18, 60, 0.14);
      color: #9f1239;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .connection-state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e11d48;
      box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subhead {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 1rem;
    }

    .badge {
      display: block;
      width: 100%;
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.9rem;
      overflow-wrap: anywhere;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 16px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      border: 1px solid var(--line);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
    }

    .stat-label {
      display: block;
      color: var(--quiet);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .controls {
      padding: 16px;
      border-radius: 14px;
      background: rgba(241, 245, 249, 0.84);
      border: 1px solid var(--line);
    }

    .controls h2 {
      margin: 0 0 12px;
      font-size: 0.9rem;
      letter-spacing: 0;
    }

    .controls p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 11px 15px;
      font: inherit;
      font-weight: 800;
      font-size: 0.92rem;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      color: #ffffff;
      background: linear-gradient(180deg, #3b82f6, var(--accent));
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.26);
    }

    .primary:hover {
      background: linear-gradient(180deg, #2563eb, var(--accent-hover));
    }

    .secondary {
      color: #263143;
      background: rgba(255, 255, 255, 0.74);
      border-color: var(--line-strong);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .secondary:hover {
      background: #ffffff;
      border-color: rgba(37, 99, 235, 0.26);
    }

    .stage {
      padding: 28px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(235, 240, 247, 0.82)),
        var(--surface);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 42%),
        linear-gradient(315deg, rgba(15, 23, 42, 0.08), transparent 46%);
      border: 1px solid rgba(255, 255, 255, 0.74);
      pointer-events: none;
    }

    .canvas-wrap {
      position: relative;
      width: min(100%, 840px);
      aspect-ratio: 1 / 1;
      max-height: calc(100vh - 84px);
      z-index: 1;
      border-radius: 26px;
      padding: 18px;
      background:
        linear-gradient(145deg, #f8fafc, #cbd5e1 42%, #64748b 100%);
      border: 1px solid rgba(15, 23, 42, 0.24);
      box-shadow:
        var(--shadow-deep),
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -18px 36px rgba(15, 23, 42, 0.18);
    }

    .canvas-wrap::before,
    .canvas-wrap::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }

    .canvas-wrap::before {
      inset: 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent 38%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      mix-blend-mode: screen;
    }

    .canvas-wrap::after {
      left: 12%;
      right: 12%;
      bottom: 8px;
      height: 3px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.22);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.14), transparent 40%),
        linear-gradient(180deg, #111827, #07111f);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 24px 44px rgba(255, 255, 255, 0.04),
        inset 0 -28px 44px rgba(0, 0, 0, 0.42);
    }

    .status {
      margin-top: auto;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.45;
      min-height: 2.9em;
    }

    .status.alert {
      color: var(--danger);
      background: #fff1f2;
      border-color: rgba(190, 18, 60, 0.14);
    }

    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .meta {
        max-height: none;
      }

      .canvas-wrap {
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      .shell {
        padding: 14px;
      }

      .meta,
      .stage {
        padding: 18px;
      }

      .connection {
        align-items: flex-start;
        flex-direction: column;
      }

      .buttons button {
        flex: 1 1 145px;
      }

      .canvas-wrap {
        padding: 10px;
        border-radius: 20px;
      }

      .canvas-wrap::before {
        inset: 10px;
        border-radius: 12px;
      }

      canvas {
        border-radius: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="panel meta">
      <div class="connection">
        <p class="eyebrow">Offline mode</p>
        <span class="connection-state">No connection</span>
      </div>
      <div>
        <h1 id="game-title">Snake</h1>
        <p class="subhead">Orion cannot reach the network, so this tab is keeping the session active with a local game.</p>
      </div>
      <div class="badge" id="target-label">Retry target: current page</div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best">0</span>
        </div>
      </div>
      <div class="controls">
        <h2>Controls</h2>
        <p id="controls-text">Arrow keys or WASD to move.</p>
      </div>
      <div class="buttons">
        <button type="button" class="primary" id="retry-btn">Retry connection</button>
        <button type="button" class="secondary" id="restart-btn">Restart game</button>
        <button type="button" class="secondary" id="pause-btn">Pause</button>
      </div>
      <p class="status" id="status">When the connection returns, retrying will reopen the original destination.</p>
    </section>
    <section class="panel stage">
      <div class="canvas-wrap">
        <canvas id="game-canvas" width="720" height="720"></canvas>
      </div>
    </section>
  </main>

  <script src="offline-game-helpers.js"></script>
  <script src="offline.js"></script>
</body>

</html>
