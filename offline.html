<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>Offline Arcade</title>
  <style>
    :root {
      --ink: #f6f1dd;
      --muted: rgba(246, 241, 221, 0.78);
      --panel: rgba(9, 17, 32, 0.84);
      --panel-border: rgba(132, 203, 255, 0.18);
      --accent: #ffd166;
      --accent-2: #56f39a;
      --accent-3: #63b8ff;
      --danger: #ff6978;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(99, 184, 255, 0.22), transparent 36%),
        radial-gradient(circle at bottom right, rgba(255, 209, 102, 0.18), transparent 34%),
        linear-gradient(160deg, #060b17 0%, #0b1326 52%, #111929 100%);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vw;
      height: 38vw;
      max-width: 420px;
      max-height: 420px;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.24;
      pointer-events: none;
    }

    body::before {
      top: -10%;
      left: -8%;
      background: radial-gradient(circle, rgba(86, 243, 154, 0.58), transparent 68%);
      animation: drift 16s ease-in-out infinite;
    }

    body::after {
      bottom: -10%;
      right: -8%;
      background: radial-gradient(circle, rgba(255, 105, 120, 0.46), transparent 68%);
      animation: drift 20s ease-in-out infinite reverse;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 24px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: 0 24px 60px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .meta {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.76rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1rem;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .stat {
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .controls {
      padding: 18px 20px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .controls h2 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .controls p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      color: #091120;
      background: linear-gradient(135deg, var(--accent), #ffb84d);
      box-shadow: 0 14px 30px rgba(255, 209, 102, 0.22);
    }

    .secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .stage {
      padding: 22px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(99, 184, 255, 0.08), transparent 40%),
        linear-gradient(315deg, rgba(86, 243, 154, 0.07), transparent 42%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .canvas-wrap {
      position: relative;
      width: min(100%, 840px);
      aspect-ratio: 1 / 1;
      max-height: calc(100vh - 84px);
      z-index: 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(8, 14, 28, 0.96), rgba(4, 8, 18, 0.96)),
        radial-gradient(circle at top, rgba(99, 184, 255, 0.12), transparent 42%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .status {
      margin-top: auto;
      padding-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 2.9em;
    }

    .status.alert {
      color: #ffd9dd;
    }

    @media (max-width: 960px) {
      body {
        overflow: auto;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .canvas-wrap {
        max-height: none;
      }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(20px, -18px, 0) scale(1.08); }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="panel meta">
      <p class="eyebrow">Offline Arcade</p>
      <div>
        <h1 id="game-title">Snake</h1>
        <p class="subhead">No internet right now, so Orion dropped you into a built-in arcade instead.</p>
      </div>
      <div class="badge" id="target-label">Retry target: current page</div>
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="best">0</span>
        </div>
      </div>
      <div class="controls">
        <h2>Controls</h2>
        <p id="controls-text">Arrow keys or WASD to move.</p>
      </div>
      <div class="buttons">
        <button type="button" class="primary" id="retry-btn">Retry connection</button>
        <button type="button" class="secondary" id="restart-btn">Restart game</button>
      </div>
      <p class="status" id="status">Stay sharp. Refreshing this tab while you are still offline will rotate to a different game.</p>
    </section>
    <section class="panel stage">
      <div class="canvas-wrap">
        <canvas id="game-canvas" width="720" height="720"></canvas>
      </div>
    </section>
  </main>

  <script src="offline.js"></script>
</body>

</html>
