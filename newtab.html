<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com;">
  <title>New Tab</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap");

    :root {
      --ink: #1d1a2f;
      --muted: #4f516a;
      --card: rgba(255, 255, 255, 0.78);
      --card-border: rgba(29, 26, 47, 0.10);

      --accent-1: #ff4d8d;
      --accent-2: #00c2ff;
      --accent-3: #ffd166;
      --accent-4: #2ee59d;
      --accent-5: #2d6bff;
      --accent-6: #9d50bb;

      --focus: rgba(0, 194, 255, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px circle at 8% -10%, rgba(0, 194, 255, 0.22), transparent 60%),
        radial-gradient(900px circle at 98% 8%, rgba(255, 77, 141, 0.22), transparent 60%),
        radial-gradient(800px circle at 30% 100%, rgba(255, 209, 102, 0.65), transparent 60%),
        linear-gradient(180deg, #fff7f0 0%, #f2f7ff 45%, #f0fff8 100%);
      overflow: auto;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.55) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.22;
      mix-blend-mode: soft-light;
    }

    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
      transition: transform 0.18s ease-out;
    }

    .orb {
      position: absolute;
      top: var(--t, auto);
      left: var(--l, auto);
      right: var(--r, auto);
      bottom: var(--b, auto);
      width: var(--w, 240px);
      height: var(--h, 240px);
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.85;
      mix-blend-mode: screen;
      background: var(--bg);
      animation: drift 12s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .orb.o1 { --t: 12%; --l: 8%; --bg: radial-gradient(circle at 30% 30%, rgba(255, 77, 141, 0.9), rgba(255, 77, 141, 0.1)); --delay: -2s; }
    .orb.o2 { --b: 10%; --r: 14%; --w: 300px; --h: 300px; --bg: radial-gradient(circle at 30% 30%, rgba(0, 194, 255, 0.9), rgba(0, 194, 255, 0.1)); --delay: -6s; }
    .orb.o3 { --t: 60%; --l: 55%; --w: 220px; --h: 220px; --bg: radial-gradient(circle at 30% 30%, rgba(46, 229, 157, 0.9), rgba(46, 229, 157, 0.1)); --delay: -10s; }
    .orb.o4 { --t: 30%; --r: 35%; --w: 200px; --h: 200px; --bg: radial-gradient(circle at 30% 30%, rgba(255, 209, 102, 0.95), rgba(255, 209, 102, 0.2)); --delay: -4s; }
    .orb.o5 { --b: 25%; --l: 20%; --w: 280px; --h: 280px; --bg: radial-gradient(circle at 30% 30%, rgba(157, 80, 187, 0.85), rgba(157, 80, 187, 0.1)); --delay: -12s; }
    .orb.o6 { --t: 5%; --r: 60%; --w: 260px; --h: 260px; --bg: radial-gradient(circle at 30% 30%, rgba(45, 107, 255, 0.85), rgba(45, 107, 255, 0.1)); --delay: -1s; }
    .orb.o7 { --b: 40%; --r: 5%; --w: 190px; --h: 190px; --bg: radial-gradient(circle at 30% 30%, rgba(255, 107, 107, 0.9), rgba(255, 107, 107, 0.15)); --delay: -8s; }
    .orb.o8 { --t: 45%; --l: 15%; --w: 210px; --h: 210px; --bg: radial-gradient(circle at 30% 30%, rgba(123, 104, 238, 0.85), rgba(123, 104, 238, 0.1)); --delay: -14s; }
    .orb.o9 { --b: 8%; --l: 45%; --w: 240px; --h: 240px; --bg: radial-gradient(circle at 30% 30%, rgba(0, 191, 165, 0.85), rgba(0, 191, 165, 0.1)); --delay: -5s; }

    #w {
      width: min(820px, calc(100vw - 64px));
      padding: 64px 56px 52px;
      text-align: center;
      background: var(--card);
      backdrop-filter: blur(18px) saturate(1.2);
      border-radius: 36px;
      border: 1px solid var(--card-border);
      box-shadow:
        0 28px 70px rgba(40, 45, 80, 0.20),
        0 10px 30px rgba(255, 77, 141, 0.08);
      position: relative;
      z-index: 1;
      animation: rise 0.7s ease both;
      overflow: hidden;
      max-height: calc(100vh - 32px);
    }

    #w::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0));
      pointer-events: none;
      opacity: 0.9;
      z-index: 1;
    }

    .card-orbs {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
      transition: transform 0.18s ease-out;
    }

    .card-orbs span {
      position: absolute;
      top: var(--t, auto);
      left: var(--l, auto);
      right: var(--r, auto);
      bottom: var(--b, auto);
      width: var(--w, 180px);
      height: var(--h, 180px);
      border-radius: 50%;
      filter: blur(12px);
      opacity: 0.65;
      mix-blend-mode: screen;
      background: var(--bg);
      animation: var(--anim) var(--dur) ease-in-out var(--delay, 0s) infinite;
    }

    .card-orbs .c1 { --t: -40px; --l: -20px; --bg: radial-gradient(circle at 30% 30%, rgba(255, 77, 141, 0.9), rgba(255, 77, 141, 0.1)); --anim: float1; --dur: 14s; }
    .card-orbs .c2 { --b: -50px; --r: -10px; --w: 220px; --h: 220px; --bg: radial-gradient(circle at 30% 30%, rgba(0, 194, 255, 0.9), rgba(0, 194, 255, 0.1)); --anim: float2; --dur: 16s; }
    .card-orbs .c3 { --t: 40%; --r: 20%; --w: 160px; --h: 160px; --bg: radial-gradient(circle at 30% 30%, rgba(46, 229, 157, 0.9), rgba(46, 229, 157, 0.1)); --anim: float3; --dur: 12s; }
    .card-orbs .c4 { --b: 20%; --l: 30%; --w: 140px; --h: 140px; --bg: radial-gradient(circle at 30% 30%, rgba(255, 209, 102, 0.9), rgba(255, 209, 102, 0.1)); --anim: float2; --dur: 14s; --delay: -2s; }
    .card-orbs .c5 { --t: 15%; --l: 45%; --w: 130px; --h: 130px; --bg: radial-gradient(circle at 30% 30%, rgba(157, 80, 187, 0.8), rgba(157, 80, 187, 0.1)); --anim: float1; --dur: 15s; --delay: -5s; }
    .card-orbs .c6 { --t: 70%; --l: -30px; --w: 150px; --h: 150px; --bg: radial-gradient(circle at 30% 30%, rgba(45, 107, 255, 0.85), rgba(45, 107, 255, 0.1)); --anim: float3; --dur: 13s; --delay: -3s; }
    .card-orbs .c7 { --b: -30px; --l: 60%; --w: 120px; --h: 120px; --bg: radial-gradient(circle at 30% 30%, rgba(255, 107, 107, 0.85), rgba(255, 107, 107, 0.1)); --anim: float1; --dur: 11s; --delay: -7s; }
    .card-orbs .c8 { --t: 25%; --r: -25px; --w: 170px; --h: 170px; --bg: radial-gradient(circle at 30% 30%, rgba(123, 104, 238, 0.8), rgba(123, 104, 238, 0.1)); --anim: float2; --dur: 15s; --delay: -4s; }

    .content {
      position: relative;
      z-index: 2;
    }

    #c {
      font-family: "Fraunces", serif;
      font-size: 5.6rem;
      font-weight: 600;
      margin: 0 0 10px;
      letter-spacing: -0.03em;
    }

    #d {
      font-size: 1.05rem;
      color: var(--muted);
      margin: 0 0 42px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }

    .search {
      position: relative;
      margin: 0 0 42px;
    }

    .search::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
      opacity: 0.9;
      z-index: 0;
    }

    #i {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 18px 26px;
      border-radius: 999px;
      border: none;
      background: rgba(255, 255, 255, 0.92);
      outline: 0;
      font-size: 1.05rem;
      text-align: center;
      color: var(--ink);
      box-shadow: 0 12px 30px rgba(29, 26, 47, 0.12);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #i::placeholder {
      color: rgba(79, 81, 106, 0.65);
    }

    #i:focus {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(29, 26, 47, 0.18), 0 0 0 6px var(--focus);
    }

    #g {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
    }

    #g .shortcut {
      position: relative;
    }

    #g .shortcut a {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: inherit;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.96;
      animation: pop 0.6s ease backwards;
      animation-delay: calc(0.05s * var(--i, 1));
    }

    #g .shortcut:hover a {
      transform: translateY(-4px);
      opacity: 1;
    }

    .remove-shortcut {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(29, 26, 47, 0.15);
      color: var(--ink);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
      backdrop-filter: blur(6px);
      display: none;
    }

    .remove-shortcut:hover {
      background: rgba(29, 26, 47, 0.25);
    }

    .shortcut.show-remove .remove-shortcut {
      display: block;
    }

    b {
      width: 68px;
      height: 68px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 12px;
      color: #fff;
      text-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
      box-shadow: 0 14px 30px rgba(29, 26, 47, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: linear-gradient(135deg, var(--accent-5), var(--accent-2));
    }

    #g .shortcut:nth-child(4n + 1) b {
      background: linear-gradient(135deg, #ff4d8d, #ff9f68);
    }

    #g .shortcut:nth-child(4n + 2) b {
      background: linear-gradient(135deg, #00c2ff, #2ee59d);
    }

    #g .shortcut:nth-child(4n + 3) b {
      background: linear-gradient(135deg, #ffd166, #ff9f1c);
      color: #5a3410;
      text-shadow: none;
    }

    #g .shortcut:nth-child(4n + 4) b {
      background: linear-gradient(135deg, #2d6bff, #00c2ff);
    }

    a:hover b {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 18px 34px rgba(29, 26, 47, 0.24);
    }

    small {
      font-size: 0.95rem;
      color: #2f314a;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      #w {
        padding: 52px 32px 44px;
        border-radius: 28px;
        width: min(820px, calc(100vw - 32px));
      }

      #c {
        font-size: 4.4rem;
      }

      #d {
        letter-spacing: 0.18em;
      }

      #g {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
    }

    @media (max-height: 760px) {
      body {
        display: block;
        padding: 16px 0 20px;
      }

      #w {
        margin: 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }

      .orb {
        animation: drift 12s ease-in-out var(--delay) infinite !important;
      }

      .card-orbs span {
        animation: var(--anim) var(--dur) ease-in-out var(--delay, 0s) infinite !important;
      }

      .orbs,
      .card-orbs {
        transform: none !important;
      }
    }

    @keyframes rise {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pop {
      from { transform: translateY(10px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(80px, -120px) scale(1.15); }
      50% { transform: translate(-60px, -80px) scale(1.25); }
      75% { transform: translate(-100px, 60px) scale(1.1); }
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(50px, 35px) scale(1.12) rotate(12deg); }
      66% { transform: translate(30px, -25px) scale(1.18) rotate(-8deg); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(-45px, -40px) scale(1.2) rotate(-15deg); }
      66% { transform: translate(-25px, 30px) scale(1.1) rotate(10deg); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(40px, -35px) scale(1.15) rotate(18deg); }
      66% { transform: translate(-35px, -20px) scale(1.2) rotate(-12deg); }
    }
  </style>
</head>

<body>
  <div class="orbs" aria-hidden="true">
    <span class="orb o1"></span>
    <span class="orb o2"></span>
    <span class="orb o3"></span>
    <span class="orb o4"></span>
    <span class="orb o5"></span>
    <span class="orb o6"></span>
    <span class="orb o7"></span>
    <span class="orb o8"></span>
    <span class="orb o9"></span>
  </div>
  <div id="w">
    <div class="card-orbs" aria-hidden="true">
      <span class="c1"></span>
      <span class="c2"></span>
      <span class="c3"></span>
      <span class="c4"></span>
      <span class="c5"></span>
      <span class="c6"></span>
      <span class="c7"></span>
      <span class="c8"></span>
    </div>
    <div class="content">
      <div id="c"></div>
      <div id="d"></div>
      <div class="search">
        <input type="text" id="i" placeholder="Search the web" autofocus autocomplete="off">
      </div>
      <div id="g"></div>
    </div>
  </div>

  <script src="localization.js"></script>
  <script>
    const localization = window.OrionLocalization;
    const clock = document.getElementById('c');
    const dateE = document.getElementById('d');
    const search = document.getElementById('i');
    const grid = document.getElementById('g');
    let currentLocale = localization.resolveLocale(localStorage.getItem('orion-locale'));

    const t = (key, vars = {}) => localization.t(currentLocale, key, vars);

    function applyTranslations() {
      document.documentElement.lang = currentLocale;
      document.title = t('newtab.pageTitle');
      search.setAttribute('placeholder', t('newtab.searchPlaceholder'));
    }

    async function syncLocale() {
      try {
        const response = window.electron && window.electron.invoke
          ? await window.electron.invoke('get-language-settings')
          : null;
        const locale = localization.sanitizeLocale(response && response.locale);
        if (locale) {
          currentLocale = locale;
          try { localStorage.setItem('orion-locale', locale); } catch (e) { }
        }
      } catch (e) { }
      applyTranslations();
      updateTime();
      renderShortcuts();
    }

    function shouldShowSeconds() {
      return localStorage.getItem('show-seconds') === 'true';
    }

    function updateTime() {
      const now = new Date();
      const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: false };
      if (shouldShowSeconds()) timeOpts.second = '2-digit';
      const intlLocale = localization.getIntlLocale(currentLocale);
      clock.textContent = now.toLocaleTimeString(intlLocale, timeOpts);
      dateE.textContent = now.toLocaleDateString(intlLocale, { weekday: 'long', month: 'long', day: 'numeric' });
    }

    setInterval(updateTime, 1000);
    applyTranslations();
    updateTime();

    window.addEventListener('storage', (e) => {
      if (e.key === 'show-seconds') updateTime();
      if (e.key === 'orion-locale' && localization.sanitizeLocale(e.newValue)) {
        currentLocale = localization.resolveLocale(e.newValue);
        applyTranslations();
        updateTime();
        renderShortcuts();
      }
    });

    search.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const query = search.value.trim();
        if (query) {
          if (window.electron && window.electron.invoke) {
            window.electron.invoke('navigate-to', query);
          } else {
            window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
          }
        }
      }
    });

    const defaultShortcuts = [
      { name: 'Google', url: 'https://google.com', icon: 'G' },
      { name: 'YouTube', url: 'https://youtube.com', icon: 'Y' },
      { name: 'GitHub', url: 'https://github.com', icon: 'H' },
      { name: 'Wikipedia', url: 'https://wikipedia.org', icon: 'W' }
    ];
    const HIDDEN_DEFAULT_SHORTCUTS_KEY = 'hidden-default-newtab-shortcuts';

    function escapeHtml(str, forAttr) {
      const s = (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return forAttr ? s.replace(/"/g, '&quot;').replace(/'/g, '&#39;') : s;
    }

    function getJson(key, fallback = []) {
      try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return fallback; }
    }

    function getHiddenDefaultShortcuts() {
      return getJson(HIDDEN_DEFAULT_SHORTCUTS_KEY);
    }

    function hideDefaultShortcut(url) {
      if (!url) return;
      const hidden = getHiddenDefaultShortcuts();
      if (!hidden.includes(url)) {
        hidden.push(url);
        try { localStorage.setItem(HIDDEN_DEFAULT_SHORTCUTS_KEY, JSON.stringify(hidden)); } catch (e) { }
      }
    }

    function removeStoredShortcut(url, id) {
      if (!url) return;
      const bms = getJson('browser-bookmarks');
      const filtered = bms.filter((b) => {
        if (id) return String(b.id) !== String(id);
        return b.url !== url;
      });
      try { localStorage.setItem('browser-bookmarks', JSON.stringify(filtered)); } catch (e) { }
    }

    function hideShortcutRemoveButtons() {
      if (!grid) return;
      grid.querySelectorAll('.shortcut.show-remove').forEach((el) => el.classList.remove('show-remove'));
    }

    document.addEventListener('click', (event) => {
      if (!grid || !event.target) return;
      if (!grid.contains(event.target)) hideShortcutRemoveButtons();
    });

    function renderShortcuts() {
      if (!grid) return;
      let shortcuts = getJson('browser-bookmarks').filter((b) => b.target === 'newtab' || b.target === 'both');

      if (shortcuts.length === 0) {
        const hiddenDefaults = getHiddenDefaultShortcuts();
        shortcuts = defaultShortcuts
          .filter((entry) => !hiddenDefaults.includes(entry.url))
          .map((entry) => ({ ...entry, _default: true }));
      }

      grid.innerHTML = shortcuts
        .map((shortcut, i) => {
          const rawTitle = shortcut.name || shortcut.title || shortcut.url || '?';
          const shortLabel = (rawTitle[0] || '?').toUpperCase();
          const label = escapeHtml(shortLabel);
          const displayTitle = escapeHtml(rawTitle);
          const urlAttr = escapeHtml(shortcut.url, true);
          const ariaLabel = escapeHtml(t('newtab.removeShortcut', { name: rawTitle }), true);
          const idAttr = shortcut.id ? `data-id="${escapeHtml(String(shortcut.id), true)}"` : '';

          return `
            <div class="shortcut" style="--i: ${i + 1}" data-url="${urlAttr}" data-default="${!!shortcut._default}" ${idAttr}>
              <a href="${urlAttr}">
                <b>${label}</b>
                <small>${displayTitle}</small>
              </a>
              <button type="button" class="remove-shortcut" aria-label="${ariaLabel}">×</button>
            </div>
          `;
        })
        .join('');
    }

    if (grid) {
      grid.addEventListener('click', (e) => {
        const anchor = e.target.closest('a');
        const removeBtn = e.target.closest('.remove-shortcut');
        if (removeBtn) {
          e.preventDefault();
          e.stopPropagation();
          const shortcutEl = removeBtn.closest('.shortcut');
          if (!shortcutEl) return;
          const targetUrl = shortcutEl.dataset.url;
          if (shortcutEl.dataset.default === 'true') hideDefaultShortcut(targetUrl);
          else removeStoredShortcut(targetUrl, shortcutEl.dataset.id);
          renderShortcuts();
        } else if (anchor) {
          e.preventDefault();
          const targetUrl = anchor.closest('.shortcut')?.dataset.url;
          if (targetUrl) navigate(targetUrl);
        }
      });
      grid.addEventListener('contextmenu', (e) => {
        const shortcutEl = e.target.closest('.shortcut');
        if (shortcutEl) {
          e.preventDefault();
          hideShortcutRemoveButtons();
          shortcutEl.classList.add('show-remove');
        }
      });
    }

    function navigate(url) {
      if (window.electron && window.electron.invoke) {
        window.electron.invoke('navigate-to', url);
      } else {
        window.location.href = url;
      }
    }

    renderShortcuts();
    syncLocale();

    // Parallax on wrappers so orb keyframe animations keep running smoothly.
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const orbLayer = document.querySelector('.orbs');
    const cardOrbLayer = document.querySelector('.card-orbs');

    if (!prefersReducedMotion && orbLayer && cardOrbLayer) {
      let frame = null;
      let px = 0;
      let py = 0;

      const paintParallax = () => {
        orbLayer.style.transform = `translate3d(${px}px, ${py}px, 0)`;
        cardOrbLayer.style.transform = `translate3d(${px * 0.55}px, ${py * 0.55}px, 0)`;
        frame = null;
      };

      document.addEventListener('mousemove', (e) => {
        px = (e.clientX / window.innerWidth - 0.5) * 20;
        py = (e.clientY / window.innerHeight - 0.5) * 20;
        if (!frame) frame = requestAnimationFrame(paintParallax);
      });

      document.addEventListener('mouseleave', () => {
        px = 0;
        py = 0;
        if (!frame) frame = requestAnimationFrame(paintParallax);
      });
    }
  </script>
</body>

</html>
