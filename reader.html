<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; media-src 'self' https: data: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; connect-src 'none';">
  <title>Reader</title>
  <style>
    :root {
      --page-bg: #f3e8d8;
      --page-surface: rgba(255, 252, 246, 0.92);
      --page-border: rgba(60, 47, 30, 0.12);
      --page-text: #1f1a14;
      --page-muted: #6d5d4f;
      --page-accent: #8a5d2b;
      --page-width: 760px;
      --page-font-size: 20px;
      --page-line-height: 1.78;
      --page-font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      --chrome-bg: rgba(24, 18, 12, 0.72);
      --chrome-border: rgba(255, 255, 255, 0.12);
      --vista-btn-face: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(234, 240, 247, 0.98) 45%, rgba(194, 208, 225, 0.98) 100%);
      --vista-btn-face-hover: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(243, 248, 253, 0.98) 42%, rgba(208, 222, 238, 1) 100%);
      --vista-btn-face-active: linear-gradient(180deg, rgba(181, 196, 214, 0.98) 0%, rgba(223, 232, 242, 0.98) 100%);
      --vista-btn-border: rgba(126, 145, 168, 0.76);
      --vista-btn-border-strong: rgba(102, 124, 150, 0.9);
      --vista-btn-highlight: rgba(255, 255, 255, 0.94);
      --vista-btn-shadow: 0 1px 0 rgba(255, 255, 255, 0.86), 0 8px 18px rgba(15, 22, 33, 0.2);
      --vista-btn-primary-face: linear-gradient(180deg, #fbfdff 0%, #d1e6fb 34%, #6f8fb5 72%, #536f92 100%);
      --vista-btn-primary-face-hover: linear-gradient(180deg, #ffffff 0%, #deefff 34%, #7d9dc2 72%, #5d7b9e 100%);
      --vista-btn-primary-face-active: linear-gradient(180deg, #516d8f 0%, #87a8cc 100%);
      --vista-btn-primary-border: rgba(87, 109, 136, 0.92);
      --vista-btn-primary-text: #f9fbff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      background: var(--page-bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--page-text);
      background: var(--page-bg);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      overflow: auto;
    }

    body[data-theme="night"] {
      --page-bg: #0f141a;
      --page-surface: rgba(16, 22, 29, 0.95);
      --page-border: rgba(255, 255, 255, 0.08);
      --page-text: #eef2f7;
      --page-muted: #9bacbb;
      --page-accent: #8bc4ff;
      --chrome-bg: rgba(8, 12, 18, 0.8);
      --chrome-border: rgba(255, 255, 255, 0.1);
      --vista-btn-face: linear-gradient(180deg, rgba(59, 77, 102, 0.96) 0%, rgba(28, 38, 52, 0.98) 100%);
      --vista-btn-face-hover: linear-gradient(180deg, rgba(72, 94, 122, 0.98) 0%, rgba(36, 49, 66, 1) 100%);
      --vista-btn-face-active: linear-gradient(180deg, rgba(23, 31, 43, 1) 0%, rgba(63, 84, 110, 0.98) 100%);
      --vista-btn-border: rgba(171, 198, 229, 0.4);
      --vista-btn-border-strong: rgba(197, 219, 246, 0.62);
      --vista-btn-highlight: rgba(255, 255, 255, 0.16);
      --vista-btn-shadow: 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 20px rgba(0, 0, 0, 0.3);
      --vista-btn-primary-face: linear-gradient(180deg, #8dc8ff 0%, #4b82bc 56%, #27466f 100%);
      --vista-btn-primary-face-hover: linear-gradient(180deg, #9ed0ff 0%, #5b92cd 56%, #325583 100%);
      --vista-btn-primary-face-active: linear-gradient(180deg, #24446b 0%, #6798cf 100%);
      --vista-btn-primary-border: rgba(173, 213, 250, 0.72);
    }

    body[data-theme="sepia"] {
      --page-bg: #f2e4cf;
      --page-surface: rgba(255, 249, 240, 0.94);
      --page-text: #2c2218;
      --page-muted: #776352;
      --page-accent: #8a5d2b;
    }

    body[data-theme="light"] {
      --page-bg: #f6f7fb;
      --page-surface: rgba(255, 255, 255, 0.95);
      --page-text: #16181d;
      --page-muted: #647187;
      --page-accent: #2864ff;
    }

    .chrome {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      background: var(--chrome-bg);
      border-bottom: 1px solid var(--chrome-border);
      backdrop-filter: blur(18px);
      color: #fff;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.68);
      margin: 0 0 4px;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
    }

    .segmented {
      display: inline-flex;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .chip,
    .button {
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .chip {
      padding: 8px 12px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.72);
    }

    .chip.active {
      border-color: var(--vista-btn-primary-border);
      background: var(--vista-btn-primary-face);
      color: var(--vista-btn-primary-text);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), inset 0 -1px 0 rgba(16, 45, 83, 0.28), 0 8px 18px rgba(9, 15, 24, 0.26);
    }

    .button {
      padding: 10px 14px;
      border: 1px solid var(--vista-btn-primary-border);
      background: var(--vista-btn-primary-face);
      color: var(--vista-btn-primary-text);
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34), inset 0 -1px 0 rgba(16, 45, 83, 0.28), 0 12px 24px rgba(9, 15, 24, 0.24);
    }

    .button:hover,
    .chip:hover {
      transform: translateY(-1px);
    }

    .button:hover {
      background: var(--vista-btn-primary-face-hover);
    }

    .chip:hover {
      border-color: var(--vista-btn-border-strong);
      background: var(--vista-btn-face-hover);
      color: #102133;
      box-shadow: inset 0 1px 0 var(--vista-btn-highlight), inset 0 -1px 0 rgba(95, 120, 150, 0.22), var(--vista-btn-shadow);
    }

    .button:active,
    .chip:active,
    .font-controls button:active {
      transform: translateY(1px);
    }

    .shell {
      display: grid;
      justify-items: center;
      padding: 34px 18px max(40px, env(safe-area-inset-bottom, 0px));
    }

    .card {
      width: min(var(--page-width), calc(100vw - 32px));
      background: var(--page-surface);
      color: var(--page-text);
      border: 1px solid var(--page-border);
      border-radius: 30px;
      box-shadow: 0 22px 60px rgba(23, 18, 10, 0.16);
      backdrop-filter: blur(12px);
      padding: 38px clamp(22px, 4vw, 54px) 42px;
    }

    .card.unavailable {
      text-align: center;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: center;
      color: var(--page-muted);
      margin-top: 10px;
      font-size: 0.94rem;
    }

    .source-link {
      color: var(--page-accent);
      text-decoration: none;
      word-break: break-all;
    }

    .source-link:hover {
      text-decoration: underline;
    }

    .display-title {
      margin: 16px 0 18px;
      font-family: var(--page-font-family);
      font-size: clamp(2.2rem, 6vw, 4.4rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 0;
      color: var(--page-muted);
      line-height: 1.65;
      font-size: 1.02rem;
      max-width: 70ch;
    }

    .content {
      margin-top: 28px;
      font-size: var(--page-font-size);
      line-height: var(--page-line-height);
      font-family: var(--page-font-family);
    }

    .content p,
    .content li,
    .content blockquote {
      margin: 0 0 1.1em;
    }

    .content h2,
    .content h3,
    .content h4 {
      margin: 1.8em 0 0.6em;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .content blockquote {
      padding: 0.2em 0 0.2em 1.2em;
      border-left: 4px solid rgba(138, 93, 43, 0.32);
      color: var(--page-muted);
    }

    .content ul,
    .content ol {
      padding-left: 1.3em;
      margin: 0 0 1.1em;
    }

    figure {
      margin: 28px 0;
    }

    figure.reader-image {
      margin: 32px 0;
      text-align: center;
    }

    figure img {
      width: 100%;
      border-radius: 18px;
      display: block;
      object-fit: cover;
      border: 1px solid var(--page-border);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }

    figure.reader-image img {
      max-height: 600px;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.02);
    }

    figcaption {
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--page-muted);
    }

    .status {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(138, 93, 43, 0.12);
      color: var(--page-accent);
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .unavailable-copy {
      margin: 0 auto 22px;
      max-width: 58ch;
      color: var(--page-muted);
      line-height: 1.65;
    }

    .hidden {
      display: none !important;
    }

    .font-controls {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .font-controls button {
      border: 1px solid var(--vista-btn-border);
      border-radius: 999px;
      padding: 8px 10px;
      background: var(--vista-btn-face);
      color: #142638;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      box-shadow: inset 0 1px 0 var(--vista-btn-highlight), inset 0 -1px 0 rgba(95, 120, 150, 0.18), var(--vista-btn-shadow);
    }

    .font-controls button:hover {
      background: var(--vista-btn-face-hover);
      border-color: var(--vista-btn-border-strong);
      color: #0d1d2d;
    }

    @media (max-width: 720px) {
      .chrome {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        width: 100%;
        justify-content: flex-start;
      }

      .segmented,
      .font-controls {
        max-width: 100%;
      }

      .card {
        width: min(100vw - 20px, var(--page-width));
        padding: 28px 18px 32px;
        border-radius: 22px;
      }
    }
  </style>
</head>

<body data-theme="sepia">
  <header class="chrome">
    <div>
      <p class="eyebrow" id="reader-kicker">Reader mode</p>
      <p class="title" id="page-label">Loading article</p>
    </div>
    <div class="controls">
      <div class="segmented" id="reader-theme-controls" role="group" aria-label="Theme">
        <button class="chip active" id="theme-sepia" data-theme="sepia" type="button">Sepia</button>
        <button class="chip" id="theme-light" data-theme="light" type="button">Light</button>
        <button class="chip" id="theme-night" data-theme="night" type="button">Night</button>
      </div>
      <div class="font-controls" id="reader-font-controls" aria-label="Font size">
        <button id="font-smaller" type="button">A−</button>
        <button id="font-reset" type="button">A</button>
        <button id="font-larger" type="button">A+</button>
      </div>
      <button class="button" id="exit-reader" type="button">Back to page</button>
    </div>
  </header>

  <main class="shell">
    <article class="card" id="reader-card">
      <div id="reader-state" class="status hidden"></div>
      <p class="eyebrow" id="site-name"></p>
      <h1 class="display-title" id="reader-title">Loading…</h1>
      <p class="subtitle" id="reader-subtitle"></p>
      <div class="meta" id="reader-meta"></div>
      <div class="content" id="reader-content"></div>
    </article>
  </main>

  <script src="localization.js"></script>
  <script src="reader.js"></script>
</body>

</html>
